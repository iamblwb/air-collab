<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>✋ Air Draw — 空中 3D 繪圖</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    #cam {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      z-index: 1;
    }

    #trace {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    #three {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 3;
    }

    /* Splash screen */
    #splash {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100;
      color: #fff;
      gap: 18px;
      text-align: center;
      padding: 24px;
    }
    #splash h1 { font-size: 2rem; letter-spacing: 2px; }
    #splash p { font-size: 1rem; color: #aaa; line-height: 1.6; max-width: 420px; }
    #splash .gestures { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin: 8px 0; }
    #splash .g-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 12px 18px;
      min-width: 130px;
      font-size: 0.85rem;
    }
    #splash .g-card .emoji { font-size: 1.8rem; display: block; margin-bottom: 4px; }
    #start-btn {
      background: linear-gradient(135deg, #4488ff, #44ffaa);
      color: #000;
      border: none;
      border-radius: 30px;
      padding: 14px 36px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.15s, opacity 0.15s;
    }
    #start-btn:hover { transform: scale(1.04); opacity: 0.9; }

    /* Status bar */
    #status {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 30px;
      padding: 10px 24px;
      color: #fff;
      font-size: 0.95rem;
      z-index: 10;
      white-space: nowrap;
      transition: background 0.3s;
      pointer-events: none;
    }

    /* Top info bar */
    #info {
      position: fixed;
      top: 16px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 6px 18px;
      color: rgba(255,255,255,0.7);
      font-size: 0.8rem;
      z-index: 10;
      pointer-events: none;
    }

    /* Hint overlay for pinch */
    #pinch-hint {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(68,255,170,0.18);
      border: 2px solid #44ffaa;
      border-radius: 16px;
      padding: 12px 24px;
      color: #44ffaa;
      font-size: 1rem;
      font-weight: 600;
      z-index: 10;
      pointer-events: none;
      display: none;
    }
  </style>
</head>
<body>

<video id="cam" autoplay muted playsinline></video>
<canvas id="trace"></canvas>
<canvas id="three"></canvas>

<div id="splash">
  <h1>✋ Air Draw</h1>
  <p>用手指在空中繪製 3D 物件，漂浮在你的真實空間中。</p>
  <div class="gestures">
    <div class="g-card"><span class="emoji">☝️</span>伸食指<br>空中畫線</div>
    <div class="g-card"><span class="emoji">🤏</span>捏合手勢<br>完成形狀</div>
    <div class="g-card"><span class="emoji">✊</span>握拳<br>清除場景</div>
  </div>
  <p style="font-size:0.8rem;color:#666;">需要相機授權 · 支援多人協作</p>
  <button id="start-btn">🎥 開啟相機並開始</button>
</div>

<div id="status">⏳ 正在初始化…</div>
<div id="info">🌐 air.iamblwb.com</div>
<div id="pinch-hint">🤏 捏合完成形狀！</div>

<!-- MediaPipe Hands (stable CDN) -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<!-- Three.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
// ─── Config ──────────────────────────────────────────────────────────────
const WS_URL = 'wss://air.iamblwb.com/ws';

// ─── State ───────────────────────────────────────────────────────────────
let trail = [];
let isDrawing = false;
let lastGesture = '';
let sceneObjects = []; // {mesh, id}
let pinchCooldown = false;
let fistCooldown = false;

// ─── Elements ────────────────────────────────────────────────────────────
const video   = document.getElementById('cam');
const traceCanvas = document.getElementById('trace');
const ctx     = traceCanvas.getContext('2d');
const statusEl = document.getElementById('status');
const splashEl = document.getElementById('splash');
const pinchHint = document.getElementById('pinch-hint');

function setStatus(msg, color = '') {
  statusEl.textContent = msg;
  statusEl.style.background = color ? `rgba(${color},0.7)` : 'rgba(0,0,0,0.65)';
}

// ─── Canvas resize ───────────────────────────────────────────────────────
function resizeCanvases() {
  traceCanvas.width  = window.innerWidth;
  traceCanvas.height = window.innerHeight;
  if (renderer) {
    renderer.setSize(window.innerWidth, window.innerHeight);
    threeCamera.aspect = window.innerWidth / window.innerHeight;
    threeCamera.updateProjectionMatrix();
  }
}
window.addEventListener('resize', resizeCanvases);

// ─── Three.js setup ──────────────────────────────────────────────────────
let renderer, scene, threeCamera, ambientLight, pointLight;

function initThree() {
  renderer = new THREE.WebGLRenderer({
    canvas: document.getElementById('three'),
    alpha: true,
    antialias: true
  });
  renderer.setClearColor(0x000000, 0);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;

  scene = new THREE.Scene();

  threeCamera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  threeCamera.position.z = 5;

  ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambientLight);

  pointLight = new THREE.PointLight(0x88aaff, 2, 20);
  pointLight.position.set(0, 2, 4);
  scene.add(pointLight);

  // Extra warm fill
  const fillLight = new THREE.PointLight(0xffaa44, 1, 15);
  fillLight.position.set(-3, -2, 3);
  scene.add(fillLight);

  animate();
}

function animate() {
  requestAnimationFrame(animate);
  // Rotate all objects slightly for liveliness
  sceneObjects.forEach(o => {
    if (o.mesh && o.mesh.userData.spin) {
      o.mesh.rotation.y += 0.005;
      o.mesh.rotation.x += 0.002;
    }
  });
  if (renderer) renderer.render(scene, threeCamera);
}

// ─── screenToWorld ────────────────────────────────────────────────────────
function screenToWorld(sx, sy, depth = -1) {
  const x = (sx / window.innerWidth)  * 2 - 1;
  const y = -(sy / window.innerHeight) * 2 + 1;
  const vec = new THREE.Vector3(x, y, 0.5);
  vec.unproject(threeCamera);
  const dir = vec.sub(threeCamera.position).normalize();
  const dist = (depth - threeCamera.position.z) / dir.z;
  return threeCamera.position.clone().add(dir.multiplyScalar(dist));
}

// ─── Trail drawing ───────────────────────────────────────────────────────
function addToTrail(x, y) {
  // Downsample: only add if moved enough
  if (trail.length > 0) {
    const last = trail[trail.length - 1];
    const d = Math.hypot(x - last.x, y - last.y);
    if (d < 6) return;
  }
  trail.push({ x, y });
}

function drawTrail() {
  ctx.clearRect(0, 0, traceCanvas.width, traceCanvas.height);
  if (trail.length < 2) return;

  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Draw glowing trail
  for (let i = 1; i < trail.length; i++) {
    const t = i / trail.length;
    const alpha = t * 0.9 + 0.1;
    const width = t * 6 + 1;

    // Glow layer
    ctx.beginPath();
    ctx.moveTo(trail[i-1].x, trail[i-1].y);
    ctx.lineTo(trail[i].x, trail[i].y);
    ctx.strokeStyle = `rgba(68,255,170,${alpha * 0.3})`;
    ctx.lineWidth = width + 8;
    ctx.stroke();

    // Core
    ctx.beginPath();
    ctx.moveTo(trail[i-1].x, trail[i-1].y);
    ctx.lineTo(trail[i].x, trail[i].y);
    ctx.strokeStyle = `rgba(100,220,255,${alpha})`;
    ctx.lineWidth = width;
    ctx.stroke();
  }

  // Draw dot at current tip
  if (trail.length > 0) {
    const tip = trail[trail.length-1];
    ctx.beginPath();
    ctx.arc(tip.x, tip.y, 8, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(68,255,170,0.8)';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(tip.x, tip.y, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
  }

  ctx.restore();
}

function clearTrace() {
  ctx.clearRect(0, 0, traceCanvas.width, traceCanvas.height);
}

// ─── Gesture detection ────────────────────────────────────────────────────
function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y, (a.z||0) - (b.z||0));
}

function isDrawingGesture(lm) {
  // Index finger straight: tip(8) above pip(6) above mcp(5)
  const indexStraight = lm[8].y < lm[6].y && lm[6].y < lm[5].y;
  // Middle finger bent: tip(12) below pip(10)
  const middleBent = lm[12].y > lm[10].y;
  // Thumb not pinching index
  const notPinch = dist(lm[4], lm[8]) > 0.07;
  return indexStraight && middleBent && notPinch;
}

function isPinchGesture(lm) {
  return dist(lm[4], lm[8]) < 0.055;
}

function isFistGesture(lm) {
  // All fingertips below their MCPs (palm face)
  const palmY = lm[0].y;
  const tipIds = [8, 12, 16, 20];
  const mcpIds = [5, 9, 13, 17];
  return tipIds.every((tip, i) => lm[tip].y > lm[mcpIds[i]].y);
}

// ─── Shape recognition ────────────────────────────────────────────────────
function trailLength(t) {
  let len = 0;
  for (let i = 1; i < t.length; i++) len += Math.hypot(t[i].x - t[i-1].x, t[i].y - t[i-1].y);
  return len;
}

function straightness(t) {
  if (t.length < 2) return 1;
  const dx = t[t.length-1].x - t[0].x;
  const dy = t[t.length-1].y - t[0].y;
  const direct = Math.hypot(dx, dy);
  const actual = trailLength(t);
  return actual > 0 ? direct / actual : 1;
}

function isLShape(t) {
  // Find the point of max curvature
  if (t.length < 6) return false;
  // Sample three sections
  const third = Math.floor(t.length / 3);
  const v1x = t[third].x - t[0].x;
  const v1y = t[third].y - t[0].y;
  const v2x = t[t.length-1].x - t[t.length-1-third].x;
  const v2y = t[t.length-1].y - t[t.length-1-third].y;
  const dot = v1x*v2x + v1y*v2y;
  const mag1 = Math.hypot(v1x, v1y);
  const mag2 = Math.hypot(v2x, v2y);
  if (mag1 < 1 || mag2 < 1) return false;
  const cosAngle = dot / (mag1 * mag2);
  return cosAngle < 0.2 && cosAngle > -0.8; // ~L shape: 70–110 deg
}

function isWavy(t) {
  if (t.length < 10) return false;
  let turns = 0;
  let lastDir = null;
  for (let i = 2; i < t.length; i++) {
    const dy = t[i].y - t[i-1].y;
    const dir = dy > 0 ? 1 : -1;
    if (lastDir && dir !== lastDir) turns++;
    lastDir = dir;
  }
  return turns >= 3;
}

function recognizeShape(t) {
  const start = t[0], end = t[t.length - 1];
  const closeDist = Math.hypot(end.x - start.x, end.y - start.y);
  const len = trailLength(t);

  if (closeDist < 60 && len > 120) return 'circle';
  if (straightness(t) > 0.82) return 'line';
  if (isLShape(t)) return 'box';
  if (isWavy(t)) return 'wave';
  return 'tube';
}

function getTrailCenter(t) {
  const sx = t.reduce((a, p) => a + p.x, 0) / t.length;
  const sy = t.reduce((a, p) => a + p.y, 0) / t.length;
  return { x: sx, y: sy };
}

// ─── Spawn 3D objects ─────────────────────────────────────────────────────
function animateIn(mesh) {
  const start = Date.now();
  const duration = 550;
  // Elastic overshoot: scale pops slightly past 1 then settles
  function easeOutElastic(x) {
    const c4 = (2 * Math.PI) / 3;
    return x === 0 ? 0 : x === 1 ? 1 :
      Math.pow(2, -10 * x) * Math.sin((x * 10 - 0.75) * c4) + 1;
  }
  function tick() {
    const t = Math.min((Date.now() - start) / duration, 1);
    mesh.scale.setScalar(easeOutElastic(t));
    if (t < 1) requestAnimationFrame(tick);
    else mesh.scale.setScalar(1);
  }
  tick();
}

// Candy palette — random cute colors
const CANDY = [
  { color: 0xff6eb4, emissive: 0x660033 }, // pink
  { color: 0x67e8f9, emissive: 0x003344 }, // cyan
  { color: 0xa78bfa, emissive: 0x220044 }, // violet
  { color: 0x86efac, emissive: 0x003311 }, // mint
  { color: 0xfde68a, emissive: 0x443300 }, // yellow
  { color: 0xfb923c, emissive: 0x441100 }, // orange
  { color: 0x34d399, emissive: 0x003322 }, // emerald
  { color: 0xf472b6, emissive: 0x440022 }, // rose
];
function randCandy() { return CANDY[Math.floor(Math.random() * CANDY.length)]; }

// Simplify & deduplicate points (remove too-close neighbours)
function simplifyPts(pts, minDist = 0.04) {
  const out = [pts[0]];
  for (let i = 1; i < pts.length; i++) {
    if (out[out.length-1].distanceTo(pts[i]) >= minDist) out.push(pts[i]);
  }
  // need ≥ 2 distinct points
  return out.length >= 2 ? out : null;
}

function spawnObject(type, center, points3D) {
  const c = randCandy();
  const material = new THREE.MeshStandardMaterial({
    color: c.color,
    emissive: c.emissive,
    emissiveIntensity: 0.5,
    metalness: 0.2,
    roughness: 0.35,
  });

  // ── Tube radius & segments by type ─────────────────────────────
  const tubeRadius = { circle: 0.07, line: 0.06, wave: 0.05, box: 0.055, tube: 0.055 }[type] || 0.055;
  const tubeSeg    = { circle: 80, line: 4, wave: 60, box: 40, tube: 60 }[type] || 60;
  const isClosed   = type === 'circle';

  // ── Build CatmullRom curve from actual drawn path ───────────────
  // Subsample to ~40 pts for smoothness
  const step = Math.max(1, Math.floor(points3D.length / 40));
  let sampled = points3D.filter((_, i) => i % step === 0);
  // For circle: close the curve
  if (isClosed) sampled.push(sampled[0].clone());

  const clean = simplifyPts(sampled);
  let geometry;

  if (clean && clean.length >= 2) {
    try {
      const curve = new THREE.CatmullRomCurve3(clean, isClosed, 'catmullrom', 0.5);
      geometry = new THREE.TubeGeometry(curve, tubeSeg, tubeRadius, 12, isClosed);
    } catch (e) {
      geometry = new THREE.SphereGeometry(0.2, 20, 20);
    }
  } else {
    geometry = new THREE.SphereGeometry(0.2, 20, 20);
  }

  const mesh = new THREE.Mesh(geometry, material);
  // Tube is already positioned in world space — no extra position offset
  mesh.castShadow = true;
  // Slow idle rotation for circle & box
  mesh.userData.spin = false; // tube geometry lives in world space; no rotation

  mesh.scale.setScalar(0);
  scene.add(mesh);
  animateIn(mesh);
  return mesh;
}

function finalizeShape(t) {
  if (t.length < 4) return null;
  const type = recognizeShape(t);

  // Convert trail screen coords → 3D
  const points3D = t.map(p => screenToWorld(p.x, p.y, -1));

  const center2D = getTrailCenter(t);
  const center3D = screenToWorld(center2D.x, center2D.y, -1);

  const mesh = spawnObject(type, center3D, points3D);
  const id = Math.random().toString(36).slice(2);
  mesh.userData.id = id;
  sceneObjects.push({ mesh, id });

  // Flash hint
  pinchHint.style.display = 'block';
  setTimeout(() => { pinchHint.style.display = 'none'; }, 1200);

  // Broadcast
  const labels = { circle: '球體', line: '棍子', box: '方塊', wave: '飄帶', tube: '管狀' };
  setStatus(`✨ 生成${labels[type] || '物件'}！`, '0,100,60');
  setTimeout(() => setStatus('☝️ 伸食指畫線'), 2000);

  const objData = {
    id,
    shapeType: type,
    position: { x: center3D.x, y: center3D.y, z: center3D.z },
    trail: t.slice(0, 80), // send subset
  };
  wsSend({ type: 'add_object', object: objData });

  return mesh;
}

function clearScene() {
  sceneObjects.forEach(o => scene.remove(o.mesh));
  sceneObjects = [];
  clearTrace();
  trail = [];
  setStatus('🗑️ 場景已清除', '80,30,0');
  setTimeout(() => setStatus('☝️ 伸食指畫線'), 1500);
  wsSend({ type: 'clear' });
}

// ─── WebSocket ────────────────────────────────────────────────────────────
let ws = null;
let wsReconnectTimer = null;

function wsSend(data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(data));
  }
}

function connectWS() {
  try {
    ws = new WebSocket(WS_URL);
    ws.onopen = () => {
      document.getElementById('info').textContent = '🌐 已連線 · air.iamblwb.com';
    };
    ws.onmessage = (ev) => {
      try {
        const msg = JSON.parse(ev.data);
        handleWSMessage(msg);
      } catch(e) {}
    };
    ws.onclose = () => {
      document.getElementById('info').textContent = '🔴 連線中斷，重連中…';
      clearTimeout(wsReconnectTimer);
      wsReconnectTimer = setTimeout(connectWS, 3000);
    };
    ws.onerror = () => { ws.close(); };
  } catch(e) {}
}

function handleWSMessage(msg) {
  if (msg.type === 'scene_sync') {
    msg.objects?.forEach(obj => receiveObject(obj));
  } else if (msg.type === 'add_object') {
    receiveObject(msg.object);
  } else if (msg.type === 'clear') {
    sceneObjects.forEach(o => scene.remove(o.mesh));
    sceneObjects = [];
  }
}

function receiveObject(objData) {
  // Don't duplicate our own
  if (sceneObjects.find(o => o.id === objData.id)) return;

  const trail = objData.trail || [];
  const points3D = trail.length >= 2
    ? trail.map(p => screenToWorld(p.x, p.y, -1))
    : [];

  const c = objData.position || { x: 0, y: 0, z: -1 };
  const center3D = new THREE.Vector3(c.x, c.y, c.z);
  const type = objData.shapeType || 'tube';

  const mesh = spawnObject(type, center3D, points3D);
  mesh.userData.id = objData.id;
  sceneObjects.push({ mesh, id: objData.id });
}

// ─── MediaPipe Hands ──────────────────────────────────────────────────────
let hands = null;
let mpCamera = null;

function initMediaPipe() {
  hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });

  hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.5,
  });

  hands.onResults(onHandResults);

  mpCamera = new Camera(video, {
    onFrame: async () => {
      if (hands) await hands.send({ image: video });
    },
    width: 1280,
    height: 720,
  });

  mpCamera.start().then(() => {
    setStatus('☝️ 伸食指畫線');
  }).catch(err => {
    setStatus('❌ 相機錯誤：' + err.message);
  });
}

function onHandResults(results) {
  if (!results.multiHandLandmarks?.length) {
    // No hand: fade trail
    if (isDrawing) {
      clearTrace();
    }
    isDrawing = false;
    if (lastGesture !== 'none') {
      setStatus('✋ 舉起你的手');
      lastGesture = 'none';
    }
    return;
  }

  const lm = results.multiHandLandmarks[0];

  // Mirror: index tip
  const indexTip = lm[8];
  const x = (1 - indexTip.x) * window.innerWidth;
  const y = indexTip.y * window.innerHeight;

  // Move point light to finger
  if (pointLight) {
    const p3 = screenToWorld(x, y, 0);
    pointLight.position.lerp(p3, 0.2);
  }

  const drawing = isDrawingGesture(lm);
  const pinch   = isPinchGesture(lm);
  const fist    = isFistGesture(lm);

  if (fist && !fistCooldown) {
    fistCooldown = true;
    trail = [];
    clearScene();
    lastGesture = 'fist';
    setTimeout(() => { fistCooldown = false; }, 1500);
    return;
  }

  if (pinch && trail.length >= 4 && !pinchCooldown) {
    pinchCooldown = true;
    const t = [...trail];
    trail = [];
    isDrawing = false;
    clearTrace();
    finalizeShape(t);
    lastGesture = 'pinch';
    setTimeout(() => { pinchCooldown = false; }, 1000);
    return;
  }

  if (pinch && !drawing) {
    if (lastGesture !== 'pinch_wait') {
      if (trail.length >= 4) {
        setStatus('🤏 放開完成形狀！');
      } else {
        setStatus('🤏 捏合中');
      }
      lastGesture = 'pinch_wait';
    }
    return;
  }

  if (drawing) {
    isDrawing = true;
    addToTrail(x, y);
    drawTrail();
    if (lastGesture !== 'drawing') {
      setStatus(`✏️ 繪圖中… (${trail.length}pt)`);
      lastGesture = 'drawing';
    } else if (trail.length % 10 === 0) {
      setStatus(`✏️ 繪圖中… (${trail.length}pt)`);
    }
  } else {
    if (isDrawing) {
      // Transition: stop drawing but not pinching
      clearTrace();
      isDrawing = false;
    }
    if (lastGesture !== 'open') {
      setStatus('☝️ 伸食指畫線');
      lastGesture = 'open';
    }
  }
}

// ─── Start button ─────────────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', async () => {
  splashEl.style.display = 'none';
  setStatus('🎥 正在請求相機授權…');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false,
    });
    video.srcObject = stream;
    await video.play();
    setStatus('⏳ 載入手勢模型…');
    initThree();
    resizeCanvases();
    connectWS();
    initMediaPipe();
  } catch (err) {
    splashEl.style.display = 'flex';
    setStatus('❌ 相機授權失敗：' + err.message);
    alert('需要相機授權才能使用 Air Draw。\n\n錯誤：' + err.message);
  }
});

// ─── Keyboard shortcuts ────────────────────────────────────────────────────
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' || e.key === 'c') clearScene();
});
</script>
